apiVersion: v1
kind: Service
metadata:
  name: kafka-ui
  namespace: icecream-hub
spec:
  ports:
    - port: 8090
      targetPort: 8080
      nodePort: 30002
      protocol: TCP
  selector:
    app: kafka-ui
  type: NodePort
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kafka-ui
  namespace: icecream-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: kafka-ui
  template:
    metadata:
      labels:
        app: kafka-ui
    spec:
      containers:
        - name: kafka-ui
          image: provectuslabs/kafka-ui:latest
          ports:
            - containerPort: 8080
          env:
            - name: KAFKA_CLUSTERS_0_NAME
              value: "local"
            - name: KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS
              value: "kafka:9092"
            - name: DYNAMIC_CONFIG_ENABLED
              value: "true"
          resources:
            limits:
              memory: "512Mi"
              cpu: "250m"
