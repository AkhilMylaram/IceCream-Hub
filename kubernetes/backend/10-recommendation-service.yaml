apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
  namespace: icecream-hub
spec:
  ports:
    - port: 8085
  selector:
    app: recommendation-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
  namespace: icecream-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation-service
  template:
    metadata:
      labels:
        app: recommendation-service
    spec:
      initContainers:
        - name: wait-for-mysql
          image: mysql:8.0
          env:
            - name: MYSQL_PWD
              valueFrom:
                secretKeyRef:
                  name: icecream-secret
                  key: MYSQL_PASSWORD
          command: ['sh', '-c', 'until mysql -h mysql -u icecream_user -e "SELECT 1"; do sleep 2; done']
      containers:
        - name: recommendation-service
          image: akhilmylaram/icecream-recommendation:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8085
          readinessProbe:
            httpGet:
              path: /api/recommendations/popular
              port: 8085
            initialDelaySeconds: 15
            periodSeconds: 10
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: icecream-config
                  key: DATABASE_URL_RECOMMENDATION
