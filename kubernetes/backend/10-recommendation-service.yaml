apiVersion: v1
kind: Service
metadata:
  name: recommendation-service
  namespace: icecream-hub
spec:
  ports:
    - port: 8085
  selector:
    app: recommendation-service
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: recommendation-service
  namespace: icecream-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: recommendation-service
  template:
    metadata:
      labels:
        app: recommendation-service
    spec:
      containers:
        - name: recommendation-service
          image: icecream-recommendation:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8085
          env:
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: icecream-config
                  key: DATABASE_URL_RECOMMENDATION
