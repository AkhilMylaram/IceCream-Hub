apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: icecream-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx
  template:
    metadata:
      labels:
        app: nginx
    spec:
      containers:
        - name: nginx
          image: akhilmylaram/icecream-nginx:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80

