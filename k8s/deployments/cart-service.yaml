apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart-service
  namespace: icecream-hub
spec:
  replicas: 1
  selector:
    matchLabels:
      app: cart-service
  template:
    metadata:
      labels:
        app: cart-service
    spec:
      containers:
        - name: cart-service
          image: akhilmylaram/icecream-cart:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8084
          env:
            - name: REDIS_HOST
              valueFrom:
                configMapKeyRef:
                  name: icecream-config
                  key: REDIS_HOST
            - name: REDIS_PORT
              valueFrom:
                configMapKeyRef:
                  name: icecream-config
                  key: REDIS_PORT

