services:
  mysql:
    image: mysql:8.0
    container_name: icecream-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_USER: icecream_user
      MYSQL_PASSWORD: icecream_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init-scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    restart: always
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: icecream-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5

  # Kafka Infrastructure Service
  kafka:
    build: ./kafka
    container_name: icecream-kafka
    ports:
      - "9092:9092"
    environment:
      - CLUSTER_ID=Z-iuAs4ZX0CCQr9yxAZU1A
      - KAFKA_NODE_ID=0
      - KAFKA_PROCESS_ROLES=controller,broker
      - KAFKA_LISTENERS=PLAINTEXT://:9092,CONTROLLER://:9093
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://kafka:9092
      - KAFKA_CONTROLLER_QUORUM_VOTERS=0@kafka:9093
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true
    restart: always
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 10s
      timeout: 10s
      retries: 5

  # Kafka UI - Visual Monitoring on http://localhost:8090
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: icecream-kafka-ui
    ports:
      - "8090:8080"
    environment:
      - KAFKA_CLUSTERS_0_NAME=local
      - KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS=kafka:9092
      - KAFKA_CLUSTERS_0_METRICS_PORT=9092
      - DYNAMIC_CONFIG_ENABLED=true
    depends_on:
      kafka:
        condition: service_healthy
    restart: always

  auth-service:
    build: ./auth-service
    container_name: icecream-auth
    ports:
      - "8081:8081"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/auth_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=icecream_user
      - SPRING_DATASOURCE_PASSWORD=icecream_password
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  product-service:
    build: ./product-service
    container_name: icecream-product
    ports:
      - "8082:8082"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/product_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=icecream_user
      - SPRING_DATASOURCE_PASSWORD=icecream_password
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m
    depends_on:
      mysql:
        condition: service_healthy
    restart: always

  order-service:
    build: ./order-service
    container_name: icecream-order
    ports:
      - "8083:8083"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/order_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=icecream_user
      - SPRING_DATASOURCE_PASSWORD=icecream_password
      - CART_SERVICE_URL=http://cart-service:8084
      - PRODUCT_SERVICE_URL=http://product-service:8082
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cart-service:
        condition: service_started
      product-service:
        condition: service_started
    restart: always

  cart-service:
    build: ./cart-service
    container_name: icecream-cart
    ports:
      - "8084:8084"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      redis:
        condition: service_healthy
    restart: always

  recommendation-service:
    build: ./recommendation-service
    container_name: icecream-recommendation
    ports:
      - "8085:8085"
    environment:
      - DATABASE_URL=mysql+pymysql://icecream_user:icecream_password@mysql:3306/recommendation_db
      - KAFKA_HOST=kafka:9092
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: always

  api-gateway:
    build: ./api-gateway
    container_name: icecream-gateway
    ports:
      - "8080:8080"
    environment:
      - JAVA_TOOL_OPTIONS=-Xmx256m -Xms128m
    depends_on:
      - auth-service
      - product-service
      - order-service
      - cart-service
      - recommendation-service
    restart: always

  frontend:
    build: ./frontend
    container_name: icecream-frontend
    # Port 3000 is intentionally NOT published to the host.
    # All external access to the frontend goes through the NGINX reverse proxy on port 80.
    expose:
      - "3000"
    environment:
      - GATEWAY_URL=http://api-gateway:8080
    depends_on:
      - api-gateway
    restart: always

  # ── NGINX Reverse Proxy ──────────────────────────────────────────────────────
  # Entry point for ALL user-facing traffic on port 80.
  # Routes:
  #   /api/*            → api-gateway:8080   (microservices REST)
  #   /_next/static/*   → frontend:3000      (cached static JS/CSS chunks)
  #   /images/*         → frontend:3000      (cached AI-generated images)
  #   /                 → frontend:3000      (Next.js SSR pages)
  nginx:
    build: ./nginx
    container_name: icecream-nginx
    ports:
      - "80:80"
    depends_on:
      - frontend
      - api-gateway
    restart: always

# Note: Removed nginx_cache volume to avoid permission issues in AWS environments.
# Nginx will serve images directly without persistent disk caching.

volumes:
  mysql_data:
  redis_data:
