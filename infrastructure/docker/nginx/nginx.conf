
# =============================================================
#  IceCream Hub — NGINX Reverse Proxy Configuration
#  Container: icecream-nginx  |  Listens: port 80
#  Routes:
#    /api/*            → api-gateway:8080   (microservices)
#    /_next/static/*   → frontend:3000      (Next.js static chunks, cached)
#    /images/*         → frontend:3000      (AI-generated product images, cached)
#    /                 → frontend:3000      (SSR pages)
# =============================================================

worker_processes auto;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Performance ─────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;
    keepalive_timeout  65;
    types_hash_max_size 2048;
    client_max_body_size 16m;

    # ── Gzip Compression ────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/x-javascript
        image/svg+xml
        font/woff
        font/woff2;

    # ── Proxy Cache Zone ────────────────────────────────────────
    # 100 MB shared memory zone for caching static assets (images, JS, CSS)
    proxy_cache_path /var/cache/nginx
        levels=1:2
        keys_zone=static_cache:10m
        max_size=100m
        inactive=60m
        use_temp_path=off;

    # ── Upstream: Next.js Frontend ───────────────────────────────
    upstream frontend {
        server frontend:3000;
        keepalive 32;
    }

    # ── Upstream: API Gateway ────────────────────────────────────
    upstream api_gateway {
        server api-gateway:8080;
        keepalive 32;
    }

    # ── Server Block ─────────────────────────────────────────────
    server {
        listen 80;
        server_name _;

        # Security headers
        add_header X-Frame-Options           "SAMEORIGIN"   always;
        add_header X-XSS-Protection          "1; mode=block" always;
        add_header X-Content-Type-Options    "nosniff"       always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin" always;

        # ── 1. REST API  →  Spring Cloud API Gateway ────────────
        #    Matches: /api/auth/**, /api/products/**, /api/orders/**,
        #             /api/cart/**, /api/recommendations/**
        location /api/ {
            proxy_pass         http://api_gateway;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # Do NOT cache API responses (dynamic data)
            proxy_cache_bypass 1;
            proxy_no_cache     1;
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;

            proxy_connect_timeout 10s;
            proxy_read_timeout    60s;
            proxy_send_timeout    60s;
        }

        # ── 2. Next.js Static Build Chunks (JS/CSS) ─────────────
        #    Aggressively cached — Next.js content-hashes these files
        location /_next/static/ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   Connection      "";

            proxy_cache            static_cache;
            proxy_cache_valid      200 7d;
            proxy_cache_use_stale  error timeout updating;
            add_header             Cache-Control "public, max-age=604800, immutable";
            add_header             X-Cache-Status $upstream_cache_status;
        }

        # ── 3. AI-Generated Product Images & Public Assets ───────
        #    Cached for 24 hours — AI images rarely change
        location /images/ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   Connection      "";

            proxy_cache            static_cache;
            proxy_cache_valid      200 1d;
            proxy_cache_use_stale  error timeout updating;
            add_header             Cache-Control "public, max-age=86400";
            add_header             X-Cache-Status $upstream_cache_status;
        }

        # ── 4. Favicon & other root-level static files ───────────
        location ~* \.(ico|png|jpg|jpeg|webp|svg|gif|woff|woff2|ttf|eot)$ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host            $host;
            proxy_set_header   Connection      "";

            proxy_cache            static_cache;
            proxy_cache_valid      200 1d;
            proxy_cache_use_stale  error timeout updating;
            add_header             Cache-Control "public, max-age=86400";
            add_header             X-Cache-Status $upstream_cache_status;
        }

        # ── 5. Next.js Data / HMR Websocket ─────────────────────
        location /_next/ {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
            proxy_set_header   Host       $host;
        }

        # ── 6. All Other Routes → Next.js SSR ───────────────────
        #    Handles: /, /products, /auth, /cart, /orders, /checkout
        location / {
            proxy_pass         http://frontend;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   Connection        "";

            # SSR pages — no caching (personalised content)
            proxy_cache_bypass 1;
            proxy_no_cache     1;

            proxy_connect_timeout 10s;
            proxy_read_timeout    30s;
        }

        # ── Health-check endpoint (for Docker / load balancers) ──
        location /nginx-health {
            access_log off;
            return 200 "healthy\n";
            add_header Content-Type text/plain;
        }
    }
}
