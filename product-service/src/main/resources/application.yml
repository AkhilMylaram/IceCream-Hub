server:
  port: 8082

spring:
  application:
    name: product-service
  datasource:
    url: jdbc:mysql://localhost:3306/product_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: icecream_user
    password: icecream_password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus

logging:
  pattern:
    console: "[%d{yyyy-MM-dd HH:mm:ss}] [product-service] [%-5level] [%X{requestId}] %logger{36} - %msg%n"
